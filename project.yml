name: DayRing
options:
  bundleIdPrefix: com.dayring
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  DayRing:
    type: application
    platform: iOS
    sources:
      - path: DayRing
        excludes:
          - "Resources/Fonts/**"
    resources:
      - path: DayRing/Resources/Assets.xcassets
      - path: DayRing/Resources/Fonts
        buildPhase: resources
      - path: DayRing/Resources/Localizable.xcstrings
        optional: true
    info:
      path: DayRing/Info.plist
      properties:
        CFBundleDisplayName: "该起了"
        CFBundleName: DayRing
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIAppFonts:
          - GeistMono-Light.ttf
          - GeistMono-Regular.ttf
          - GeistMono-Medium.ttf
        NSAlarmKitUsageDescription: "该起了需要设置闹钟来在您指定的时间提醒您。"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayring.app
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  DayRingTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DayRingTests
    dependencies:
      - target: DayRing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dayring.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DayRing.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DayRing"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  DayRing:
    build:
      targets:
        DayRing: all
        DayRingTests: [test]
    test:
      targets:
        - DayRingTests
      gatherCoverageData: true
    run:
      config: Debug
